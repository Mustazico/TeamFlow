name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: server (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore server/TeamFlow.slnx

      - name: Build
        run: dotnet build server/TeamFlow.slnx --no-restore -c Release

      - name: Test
        env:
          Jwt__SigningKey: ci-test-signing-key-with-at-least-32-characters
        run: dotnet test server/TeamFlow.slnx --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: '**/test-results.trx'
          if-no-files-found: ignore

  client:
    name: client (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check + build
        run: npm run build

  docker:
    name: docker (build images)
    runs-on: ubuntu-latest
    needs: [server, client]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f server/Dockerfile -t teamflow-api:ci .

      - name: Build Web image
        run: docker build -f client/Dockerfile -t teamflow-web:ci .
